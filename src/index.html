<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Phd</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0d7d1a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PHD">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyChAGA30i7uZ3Z2Dq1MURL5gtngFfCbbr8"></script>
  <style>
    #app-splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: linear-gradient(150deg, #0d3d0d 0%, #0d7d1a 55%, #1baa34 100%);
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    #app-splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    #app-splash img {
      width: 96px;
      height: 96px;
      object-fit: contain;
      animation: splash-scale 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      filter: drop-shadow(0 6px 24px rgba(0,0,0,0.4));
    }
    #app-splash .splash-title {
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
      animation: splash-fade-up 0.6s ease 0.2s both;
    }
    #app-splash .splash-sub {
      color: rgba(255,255,255,0.78);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.4px;
      animation: splash-fade-up 0.6s ease 0.35s both;
    }
    #app-splash .splash-loader {
      width: 44px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      overflow: hidden;
      animation: splash-fade-up 0.6s ease 0.5s both;
    }
    #app-splash .splash-loader::after {
      content: '';
      display: block;
      height: 100%;
      width: 40%;
      background: rgba(255,255,255,0.85);
      border-radius: 4px;
      animation: splash-bar 1.2s ease-in-out infinite;
    }
    @keyframes splash-scale {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes splash-fade-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes splash-bar {
      0%   { margin-left: -40%; }
      100% { margin-left: 100%; }
    }
  </style>
</head>
<body>
  <!-- Splash screen — removed by Angular once app bootstraps -->
  <div id="app-splash">
    <img src="/images/logo.png" alt="PHD" />
    <div class="splash-title">PHD</div>
    <div class="splash-sub">Plantations Huileries du Congo</div>
    <div class="splash-loader"></div>
  </div>

  <app-root></app-root>

  <script>
    // Hide splash as soon as Angular declares the app ready
    document.addEventListener('DOMContentLoaded', function () {
      var splash = document.getElementById('app-splash');
      var observer = new MutationObserver(function () {
        var root = document.querySelector('app-root');
        if (root && root.children.length > 0) {
          splash.classList.add('hidden');
          setTimeout(function () { splash.remove(); }, 600);
          observer.disconnect();
        }
      });
      observer.observe(document.querySelector('app-root') || document.body, {
        childList: true,
        subtree: true,
      });
    });
  </script>
</body>
</html>
