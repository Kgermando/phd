<div class="login-page">
  <div class="login-card" role="main">
    <div class="login-logo">
      <mat-icon class="login-icon" aria-hidden="true">grass</mat-icon>
      <h1>RizSuivi</h1>
      <p>Recensement des riziculteurs · Territoire de Bumba</p>
    </div>

    @if (error()) {
      <div class="error-msg" role="alert">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()" #f="ngForm" novalidate>
      <div class="form-group">
        <label for="username">Nom d'utilisateur</label>
        <input
          id="username"
          class="form-control"
          type="text"
          name="username"
          [(ngModel)]="username"
          required
          autocomplete="username"
          placeholder="admin"
          [attr.aria-invalid]="error() ? 'true' : null"
        />
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          id="password"
          class="form-control"
          type="password"
          name="password"
          [(ngModel)]="password"
          required
          autocomplete="current-password"
          placeholder="••••••••"
          [attr.aria-invalid]="error() ? 'true' : null"
        />
      </div>
      <button class="btn-login" type="submit" [disabled]="loading()">
        {{ loading() ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>

    <div class="demo-hint" aria-label="Comptes de démonstration">
      <strong>Comptes de démonstration :</strong>
      <div><mat-icon aria-hidden="true">person</mat-icon> admin / admin123 (Administrateur)</div>
      <div><mat-icon aria-hidden="true">person</mat-icon> agent1 / agent123 (Agent recenseur)</div>
    </div>
  </div>
</div>
